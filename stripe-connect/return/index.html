<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigShare — Stripe setup complete</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
    .card { max-width: 640px; padding: 32px; text-align: center; }
    h1 { margin-bottom: 12px; font-size: 1.35rem; }
    p { line-height: 1.6; color: #cbd5e1; }
    a { color: #a3e635; }
    .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #a3e635; color: #0f172a; text-decoration: none; font-weight: 600; border-radius: 8px; }
    .btn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Stripe setup complete</h1>
    <p>You can close this tab and return to the GigShare app. If the app didn’t open automatically, use the button below.</p>
    <p><a class="btn" id="open-app" href="gigsharemobile://stripe-connect/return">Open GigShare</a></p>
  </main>
  <script>
    (function () {
      var deep = "gigsharemobile://stripe-connect/return";
      try {
        window.location.replace(deep);
      } catch (e) {}
      document.getElementById("open-app").addEventListener("click", function () {
        window.location.href = deep;
      });
    })();
  </script>
</body>
</html>
